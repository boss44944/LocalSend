name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Resolve version
        id: v
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_REF_TYPE" = tag ]; then V="$GITHUB_REF_NAME"; else V="$INPUT_VERSION"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Test
        run: go test ./...
      - name: Build packages
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -eu
          mkdir -p dist work
          make_app() {
            arch="$1"; label="$2"; app="work/LAN Clipboard.app"
            rm -rf "$app"; mkdir -p "$app/Contents/MacOS"
            GOOS=darwin GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o "$app/Contents/MacOS/clipboard" .
            chmod +x "$app/Contents/MacOS/clipboard"
            cat > "$app/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleName</key><string>LAN Clipboard</string>
          <key>CFBundleDisplayName</key><string>LAN Clipboard</string>
          <key>CFBundleIdentifier</key><string>com.localsend.lanclipboard</string>
          <key>CFBundleExecutable</key><string>clipboard</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>CFBundleShortVersionString</key><string>${VERSION#v}</string>
          <key>CFBundleVersion</key><string>${VERSION#v}</string>
          <key>LSMinimumSystemVersion</key><string>11.0</string>
          </dict></plist>
          EOF
            (cd work && zip -qry "../dist/lan-clipboard-${VERSION}-macos-${label}.zip" 'LAN Clipboard.app')
          }
          make_app amd64 intel
          make_app arm64 apple-silicon
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o work/clipboard.exe .
          (cd work && zip -q "../dist/lan-clipboard-${VERSION}-windows-amd64.zip" clipboard.exe)
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o work/clipboard .
          tar -C work -czf "dist/lan-clipboard-${VERSION}-linux-amd64.tar.gz" clipboard
          (cd dist && sha256sum * > SHA256SUMS.txt)
      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist/* --clobber
          else
            gh release create "$VERSION" dist/* --target "$GITHUB_SHA" --title "LAN Clipboard $VERSION" --generate-notes
          fi
