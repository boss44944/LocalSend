name: Release

on:
  push:
    tags: ['v*']
    branches: [master]
    paths: ['.github/workflows/release.yml']
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.4
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file