name: Release

on:
  push:
    tags: ['v*']
    branches: [master]
    paths:
      - '.github/workflows/release.yml'
      - 'scripts/prepare-icons.sh'
      - 'scripts/build-release.sh'
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.4
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Resolve version
        id: v
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_REF_TYPE" = tag ]; then V="$GITHUB_REF_NAME"; elif [ -n "$INPUT_VERSION" ]; then V="$INPUT_VERSION"; else V="v0.1.3"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Test
        run: go test ./...
      - name: Prepare icons
        run: bash scripts/prepare-icons.sh
      - name: Build packages
        run: bash scripts/build-release.sh '${{ steps.v.outputs.version }}'
      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist/* --clobber
          else
            gh release create "$VERSION" dist/* --target "$GITHUB_SHA" --title "LAN Clipboard $VERSION" --generate-notes
          fi
