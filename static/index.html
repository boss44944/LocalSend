<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f6f8fa"><title>LAN Clipboard</title><link rel="stylesheet" href="/static/style.css"></head><body data-auth="{{AUTH_REQUIRED}}"><div class="shell"><header><div><h1>LAN Clipboard</h1><p>无需安装 App 的局域网剪贴板</p></div><span id="status" class="badge">连接中</span></header><main><section id="login" class="card hidden"><h2>输入访问密码</h2><p class="muted">密码显示在电脑终端中。</p><form id="loginForm"><input id="password" type="password" inputmode="numeric" autocomplete="current-password" placeholder="访问密码" required><button>进入</button></form></section><div id="app" class="hidden"><section class="card intro"><div><small>当前地址</small><strong>{{LAN_ADDRESS}}</strong><p class="muted">手机与电脑连接同一 Wi-Fi 后扫码访问。</p></div><img src="/api/qrcode" alt="访问二维码"></section><section class="card"><h2>文本</h2><form id="textForm"><textarea id="text" rows="5" maxlength="1048576" placeholder="输入要发送到电脑剪贴板的文字…" required></textarea><button>发送文本</button></form></section><section id="drop" class="card drop"><h2>图片与文件</h2><p>选择文件、拖拽到这里，或直接粘贴截图。</p><input id="files" type="file" multiple hidden><button id="choose" type="button" class="secondary">选择文件</button><div id="progress" class="progress hidden"><i></i></div></section><section><div class="heading"><h2>历史记录</h2><span id="count" class="muted">0 条</span></div><div id="history"></div><div id="empty" class="empty">还没有发送记录</div></section></div></main></div><div id="toast" class="toast"></div><script src="/static/script.js" defer></script></body></html>
