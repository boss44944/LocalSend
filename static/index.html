<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>LAN Clipboard</title><link rel="stylesheet" href="/static/style.css"></head><body data-auth="{{AUTH_REQUIRED}}"><div class="shell"><header><div><h1>LAN Clipboard</h1><p>无需安装 App 的局域网剪贴板</p></div><span id="status" class="badge">连接中</span></header><main><section id="login" class="card hidden"><h2>输入访问密码</h2><form id="loginForm"><input id="password" type="password" placeholder="访问密码" required><button>进入</button></form></section><div id="app" class="hidden"><nav class="tabs"><button id="tabClipboard" class="active">剪贴板</button><button id="tabSettings">设置</button></nav><div id="clipboardPanel"><section class="card intro"><div><small>当前地址</small><strong>{{LAN_ADDRESS}}</strong><p class="muted">手机与电脑连接同一 Wi-Fi 后扫码访问。</p></div><img src="/api/qrcode" alt="访问二维码"></section><section class="card"><h2>文本</h2><form id="textForm"><textarea id="text" rows="5" placeholder="输入要发送到电脑剪贴板的文字…"></textarea><button>发送文本</button></form></section><section id="drop" class="card drop"><h2>图片与文件</h2><p>选择文件、拖拽到这里，或直接粘贴截图。</p><input id="files" type="file" multiple hidden><button id="choose" type="button">选择文件</button><div id="progress" class="progress hidden"><i></i></div></section><section><div class="heading"><h2>历史记录</h2><span id="count">0 条</span></div><div id="history"></div></section></div><div id="settingsPanel" class="card hidden"><h2>应用设置</h2><label>端口<input id="cfgPort" type="number"></label><label>访问认证<input id="cfgAuth" type="checkbox"></label><label>访问密码<input id="cfgPassword"></label><label>自动打开浏览器<input id="cfgOpen" type="checkbox"></label><label>最大上传(MB)<input id="cfgUpload" type="number"></label><button id="saveConfig">保存设置</button></div></div></main></div><div id="toast" class="toast"></div><script src="/static/script.js" defer></script></body></html>
